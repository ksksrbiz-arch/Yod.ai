[project]
name = "openyoda"
version = "0.0.1"
description = "Official Python SDK for the Yoda.ai API."
license = { text = "MIT" }
authors = [{ name = "1Commerce LLC" }]
requires-python = ">=3.10"
readme = "README.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["openyoda"]
